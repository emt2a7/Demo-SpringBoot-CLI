name: 【執行】✅正式環境(Prod)

on:
  push:                                                                           # 觸發時機：打上 'v' 開頭的版本標籤 (如 v1.0.0) 時
    tags:
      - 'v*'
  workflow_dispatch:                                                              # 觸發時機：手動觸發
    inputs:                                                                       # 定義傳入的參數
      version_tag:                                                                # - 參數名稱
        description: '請輸入要版本標籤 (例如 v1.1 或 latest)'                         # - 參數說明
        required: true                                                            # - 參數是否必填
        default: 'latest'                                                         # - 參數預設值

jobs:
  call-super-build:                                                               # Job名稱：call-super-build
    uses: ./.github/workflows/module-build.yml                                    # 載入共用模組 Workflow 定義檔
    with:                                                                         # 傳入參數
      job_name: "產出執行檔 (正式環境)"                                               # - 參數：Job 顯示在 UI 的名稱
      maven_profiles: "native,prod,openai"                                        # - 參數：包版環境
      artifact_name: "Demo-SpringBoot-CLI-Prod"                                   # - 參數：「執行檔」的標籤名稱，命名保持唯一不重複 (本檔案共有２處需一併調整)

  create-release:                                                                 # Job名稱：create-release
    needs: call-super-build                                                       # 必須等前一個 Job (call-super-build) 執行完成後才會執行
    name: Create GitHub Release                                                   # Job 顯示在 UI 的名稱
    runs-on: ubuntu-latest                                                        # 執行環境

    permissions:                                                                  # 賦予權限
      contents: write                                                             # - 寫入權限

    steps:                                                                        # 工作步驟
      # --------------------------------------------------------------------------
      - name: 📥 下載編譯產物                                                       # UI 顯示名稱
        uses: actions/download-artifact@v4
        with:
          name: Demo-SpringBoot-CLI-Prod                                          # 「執行檔」的標籤名稱，命名保持唯一不重複 (本檔案共有２處需一併調整)
          path: target/                                                           # 下載保存路徑

      # --------------------------------------------------------------------------
      - name: 🗑️ 刪除舊版 Release 與標籤 (若存在)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}                              # 使用 GitHub 內建的 Token 即可，因為上面已經賦予了 write 權限
        run: |
          TARGET_TAG="${{ inputs.version_tag || github.ref_name }}"
          echo "🔍 準備清理標籤為 [$TARGET_TAG] 的歷史 Release..."
          
          # 使用 || true 來防呆。如果找不到舊 Release，gh 指令會失敗，但 || true 會讓步驟強行顯示成功，不中斷流程。
          # --yes: 跳過確認提示
          # --cleanup-tag: 連同 Git Tag 一起刪除，確保極致乾淨
          gh release delete "$TARGET_TAG" --yes --cleanup-tag -R ${{ github.repository }} || echo "✅ 找不到舊版 Release..."

      # --------------------------------------------------------------------------
      - name: 📦 發布到 GitHub Releases (永久保存)                                  # UI 顯示名稱
        uses: softprops/action-gh-release@v2
        with:
          files: target/demo-springboot-cli                                      # 要發布至 release 的「執行檔」位置
          tag_name: ${{ inputs.version_tag || github.ref_name }}
          name: Release ${{ inputs.version_tag || github.ref_name }}
          generate_release_notes: true
          make_latest: true                                                      # 強迫 GitHub 將此版本標記為「最新 (Latest)」

      # --------------------------------------------------------------------------