name: ✅【刪除】最近500筆workflow紀錄

on:
  #schedule:
  #  - cron: '0 2 * * *'                            # 每天凌晨 2 點自動執行
  workflow_dispatch:                                # 觸發時機：手動觸發

jobs:
  delete_workflow_runs:                             # Job名稱：delete_workflow_runs
    runs-on: ubuntu-latest                          # 執行環境
    permissions:                                    # 賦予權限
      actions: write                                # - 必須給予刪除 Actions 紀錄的權限

    steps:
      # --------------------------------------------------------------------------
      - name: 🗑️ 刪除前 500 筆 Workflow 紀錄
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚨 開始執行刪除舊紀錄..."
          
          # ✨ 架構師魔法：利用 jq 過濾掉自己 (github.run_id)，並加上 --no-run-if-empty 防呆
          gh run list -R ${{ github.repository }} --limit 500 --json databaseId -q '.[] | select(.databaseId != ${{ github.run_id }}) | .databaseId' | xargs --no-run-if-empty -I{} gh run delete {} -R ${{ github.repository }}
          
          echo "✅ 清理完畢！"
