name: ✅【更版】開發環境(Dev)

on:
  workflow_dispatch:
    inputs:
      source_platform:                                                      # 定義傳入的參數
        description: '平台來源：line、telegram (全小寫)'                        # - 參數說明
        required: false                                                     # - 參數是否必填
        type: string                                                        # - 參數類型
        default: ''                                                         # - 參數預設值 (預設空字串)
      chat_id:                                                              # 定義傳入的參數
        description: 'line、telegram 的 ID (5015499247)'                     # - 參數說明
        required: false                                                     # - 參數是否必填
        type: string                                                        # - 參數類型
        default: ''                                                         # - 參數預設值 (預設空字串)
      user_prompt:                                                          # 定義傳入的參數
        description: '使用者提示詞 (Prompt)'                                  # - 參數說明
        required: true                                                      # - 參數是否必填
        type: string                                                        # - 參數類型
        default: '明天桃園市天氣溫度如何？'                                      # - 參數預設值

jobs:                                                 # 工作流程
  run-cli:                                            # Job名稱：run-cli
    permissions:                                      # 明確賦予呼叫共用模組所需的權限
      actions: read
      contents: read

    uses: ./.github/workflows/module-deploy.yml       # 呼叫共用模組時，路徑必須相對於專案根目錄
    with:
      user_prompt: ${{ inputs.user_prompt }}          # 輸入參數：提示詞 (Prompt)
      download_type: 'artifact'                       # 輸入參數：下載來源 (填寫 "artifact" 或 "release")
      artifact_name: 'Demo-SpringBoot-CLI-Dev'        # 輸入參數：「執行檔」的標籤名稱
      release_pattern: 'demo-springboot-cli'          # 輸入參數：「執行檔」的實體檔名
      summary_title: '### 🤖 AI 助理的回覆 (開發版本)'   # 輸入參數：GitHub Step Summary 顯示的標題
      chat_id: ${{ inputs.chat_id }}                  # 輸入參數：Telegram 聊天室 ID
    secrets: inherit                                  # 確保共用模組能繼承並使用 GITHUB_TOKEN
