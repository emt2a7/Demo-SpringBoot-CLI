name: 【✅ AI助理】小龍蝦營業中 (監聽 Issue)

# 🟢 觸發條件：當有新的 Issue 被「開啟 (opened)」時
on:
  issues:
    types: [opened]

jobs:
  run-cli-agent:
    runs-on: ubuntu-latest

    # 賦予這個腳本能在 Issue 底下留言的權限
    permissions:
      issues: write
      actions: read

    steps:
      - name: 📥 從最新 Release 下載 Linux CLI 執行檔
        # 使用 GitHub 官方 CLI 工具 (gh) 去抓取我們另一個 Workflow 編譯出來的產物
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 🟢 架構升級：使用 gh release download，永遠去抓最新正式版的執行檔，不再怕過期！
          gh release download --pattern "Demo-SpringBoot-CLI" -D .
          # 賦予 Linux 執行權限
          chmod +x Demo-SpringBoot-CLI

      - name: 🚀 執行 AI CLI 處理 Issue
        id: ai-task
        run: |
          echo "正在處理 Issue: ${{ github.event.issue.title }}"
          
          # 執行你的極速 CLI
          ./Demo-SpringBoot-CLI --mode=agent "分析這個 Issue: ${{ github.event.issue.title }} - ${{ github.event.issue.body }}" > ai_result.txt
          
          # 🟢 架構師的修正：使用 EOF 語法安全地將「多行文字」寫入 GITHUB_OUTPUT
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat ai_result.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 💬 將 AI 結果回覆到 Issue 中
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            🤖 **AI 助理回覆：**
            我已經收到並處理了您的 Issue！以下是分析結果：
            
            ```text
            ${{ steps.ai-task.outputs.result }}
            ```